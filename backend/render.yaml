services:
  - type: web
    name: king-county-housing-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false        # Set this manually in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /health
